# PR quality gate: typecheck + unit tests + P0 E2E (Chromium).
# Widen E2E (all browsers / p1) by changing the e2e job or adding a follow-up workflow.
name: CI

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-unit:
    name: Check & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Nuxt check
        run: pnpm run check

      - name: Vitest
        run: pnpm run test

  e2e-p0:
    name: Playwright P0 (Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run P0 E2E
        run: pnpm run test:e2e:p0
        env:
          CI: true

  # Requires committed appwrite.config.json (copy from appwrite.config.json.example,
  # then sync with `appwrite pull sites` — see DEPLOYMENT.md).
  # GitHub repo secrets: APPWRITE_ENDPOINT, APPWRITE_PROJECT_ID, APPWRITE_API_KEY, APPWRITE_SITE_ID
  deploy-appwrite-sites:
    name: Deploy Appwrite Sites
    runs-on: ubuntu-latest
    needs: [check-and-unit, e2e-p0]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Check for appwrite.config.json
        id: check-config
        run: |
          if [ -f appwrite.config.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.check-config.outputs.exists == 'true'
        with:
          node-version: "22"

      - name: Install Appwrite CLI
        if: steps.check-config.outputs.exists == 'true'
        run: npm install -g appwrite-cli

      - name: Push site (non-interactive)
        if: steps.check-config.outputs.exists == 'true'
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_SITE_ID: ${{ secrets.APPWRITE_SITE_ID }}
        run: |
          set -euo pipefail
          appwrite client \
            --endpoint "$APPWRITE_ENDPOINT" \
            --project-id "$APPWRITE_PROJECT_ID" \
            --key "$APPWRITE_API_KEY"
          appwrite push sites --site-id "$APPWRITE_SITE_ID" --activate

      - name: Skip deployment
        if: steps.check-config.outputs.exists == 'false'
        run: echo "Skipping deployment - appwrite.config.json not found"
