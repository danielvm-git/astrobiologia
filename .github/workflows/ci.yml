# PR quality gate: typecheck + unit tests + coverage gate + P0 E2E (Chromium).
# Deploy to Appwrite Sites only on main after all checks pass.
# GSD Quality Gates enforced:
#   G.1: Unit tests pass
#   G.2: E2E tests pass (P0)
#   G.3: Type check passes
#   G.4: Suite completes within 5 minutes
#   G.7: CI runs on every PR
#   G.8: CI fails on any failing test
#   S.1-S.4: Coverage thresholds enforced (statements, branches, functions)
name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-and-unit:
    name: Check & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm --filter @astrobiologia/web-astro run check

      - name: Vitest with coverage gate & G.4 timing
        run: |
          START=$(date +%s)
          pnpm --filter @astrobiologia/web-astro run test:coverage || EXIT_CODE=$?
          pnpm --filter @astrobiologia/web-astro run test:api || EXIT_CODE=${EXIT_CODE:-$?}
          END=$(date +%s)
          DURATION=$((END - START))
          echo "Suite execution time: ${DURATION}s"
          if [ "$DURATION" -gt 300 ]; then
            echo "G.4 FAIL: Suite took ${DURATION}s, exceeding 300s limit"
            exit 1
          fi
          echo "G.4 PASS: Suite completed in ${DURATION}s"
          exit ${EXIT_CODE:-0}
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/web-astro/coverage/
          retention-days: 7

  e2e-p0:
    name: Playwright P0 (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
      APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
      APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
      DATABASE_ID: ${{ secrets.DATABASE_ID }}
      ARTICLES_COLLECTION_ID: ${{ secrets.ARTICLES_COLLECTION_ID }}
      ARTICLE_TRANSLATIONS_COLLECTION_ID: ${{ secrets.ARTICLE_TRANSLATIONS_COLLECTION_ID }}
      CATEGORIES_COLLECTION_ID: ${{ secrets.CATEGORIES_COLLECTION_ID }}
      STORAGE_BUCKET_ID: ${{ secrets.STORAGE_BUCKET_ID }}
      SITE_SETTINGS_COLLECTION_ID: ${{ secrets.SITE_SETTINGS_COLLECTION_ID }}
      DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      PUBLIC_APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
      PUBLIC_APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
      PUBLIC_STORAGE_BUCKET_ID: ${{ secrets.STORAGE_BUCKET_ID }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: apps/web-astro
        run: pnpm run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-v1-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium + system deps
        working-directory: apps/web-astro
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (browser cached)
        working-directory: apps/web-astro
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        timeout-minutes: 5
        run: npx playwright install-deps chromium

      - name: Run P0 E2E
        working-directory: apps/web-astro
        timeout-minutes: 20
        run: pnpm run test:e2e:p0
        env:
          CI: true
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          ARTICLES_COLLECTION_ID: ${{ secrets.ARTICLES_COLLECTION_ID }}
          ARTICLE_TRANSLATIONS_COLLECTION_ID: ${{ secrets.ARTICLE_TRANSLATIONS_COLLECTION_ID }}
          CATEGORIES_COLLECTION_ID: ${{ secrets.CATEGORIES_COLLECTION_ID }}
          STORAGE_BUCKET_ID: ${{ secrets.STORAGE_BUCKET_ID }}
          SITE_SETTINGS_COLLECTION_ID: ${{ secrets.SITE_SETTINGS_COLLECTION_ID }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web-astro/playwright-report/
          retention-days: 7

  # Deploys using the appwrite.json template.
  # GitHub repo secrets: APPWRITE_ENDPOINT, APPWRITE_PROJECT_ID, APPWRITE_API_KEY, APPWRITE_SITE_ID
  deploy-appwrite-sites:
    name: Deploy Appwrite Sites
    runs-on: ubuntu-latest
    needs: [check-and-unit, e2e-p0]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: apps/web-astro
        run: pnpm run build

      - name: Configure appwrite.json
        run: |
          sed -i "s/PROJECT_ID/${{ secrets.APPWRITE_PROJECT_ID }}/g" appwrite.json
          sed -i "s/SITE_ID/${{ secrets.APPWRITE_SITE_ID }}/g" appwrite.json

      - name: Install Appwrite CLI
        run: npm install -g appwrite-cli

      - name: Push site (non-interactive)
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_SITE_ID: ${{ secrets.APPWRITE_SITE_ID }}
        run: |
          set -euo pipefail
          appwrite client \
            --endpoint "$APPWRITE_ENDPOINT" \
            --project-id "$APPWRITE_PROJECT_ID" \
            --key "$APPWRITE_API_KEY"
          DEPLOY_OUTPUT=$(appwrite push sites --site-id "$APPWRITE_SITE_ID" --activate --force 2>&1) || DEPLOY_EXIT=$?
          if [ -n "${DEPLOY_EXIT:-}" ]; then
            if echo "$DEPLOY_OUTPUT" | grep -qi 'paused'; then
              echo "⚠ Deploy skipped: Appwrite project is paused (free-tier inactivity)"
              echo "  Restore at https://cloud.appwrite.io → select project → Restore"
              exit 0
            fi
            echo "$DEPLOY_OUTPUT"
            exit $DEPLOY_EXIT
          fi
