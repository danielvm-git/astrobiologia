name: Deploy (BigBase)

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: apps/web-astro
        run: pnpm run build

      - name: Check BigBase secrets
        id: check
        run: |
          if [ -z "${{ secrets.BIGBASE_DEPLOY_TOKEN }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠ BigBase deploy skipped: BIGBASE_DEPLOY_TOKEN secret not configured"
            echo "  Provision via bigbase_provision_ci_credentials (MCP) or GitHub repo settings."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to BigBase
        if: steps.check.outputs.configured == 'true'
        uses: danielvm-git/.github/actions/bigbase-deploy@main
        with:
          site_id: ${{ secrets.BIGBASE_SITE_ID }}
          app_type: static
          site_url: https://astrobiologia.bigbase.click
          deploy_token: ${{ secrets.BIGBASE_DEPLOY_TOKEN }}
          bigbase_server: ${{ secrets.BIGBASE_SERVER }}
