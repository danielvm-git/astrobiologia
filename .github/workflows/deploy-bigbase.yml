name: Deploy to BigBase

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: apps/web-astro
        run: pnpm run build

      - name: Check BigBase secrets
        id: check
        run: |
          if [ -z "${{ secrets.BIGBASE_DEPLOY_TOKEN }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠ BigBase deploy skipped: BIGBASE_DEPLOY_TOKEN secret not configured"
            echo "  Provision via bigbase_provision_ci_credentials (MCP) or GitHub repo settings."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to BigBase
        if: steps.check.outputs.configured == 'true'
        uses: danielvm-git/.github/actions/bigbase-deploy@main
        with:
          site_id: ${{ secrets.BIGBASE_SITE_ID }}
          app_type: static
          site_url: https://astrobiologia.bigbase.click
          deploy_token: ${{ secrets.BIGBASE_DEPLOY_TOKEN }}
          bigbase_server: ${{ secrets.BIGBASE_SERVER }}
